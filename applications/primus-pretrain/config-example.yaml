# Primus Pretrain Configuration for Omnihub
# This config demonstrates how to run Primus pretraining through the Omnihub framework
entrypoint: applications/primus-pretrain/pretrain_wrapper.py
# Path to Primus installation
primus_path: /app/Primus
# Path to experiment config file (REQUIRED)
# This should point to a Primus experiment YAML file
exp_config: /app/Primus/examples/torchtitan/configs/MI300X/llama3.1_8B-BF16-pretrain.yaml
# Overrides for the experiment config. These values will take precedence over those in the exp_config file.
# The purpose of these overrides is for OmniHub to be able to sweep over different values and modify the
# experiment config without the user having to create multiple experiment config files for each run.
work_group: amd
user_name: root
exp_name: llama3.1_8B-pretrain
workspace: ./output
# run_mode: single → wrapper sets RUN_MODE=single so primus-cli-direct uses python3 (no inner torchrun).
# Works with OmniHub --runner manual (one Slurm task per GPU) or --runner torchrun (outer torchrun).
# Omit run_mode to leave distributed env setup to Primus; primus-cli defaults to inner torchrun unless overridden.
run_mode: single
# dry_run: true
# Primus runner shell logs (INFO or DEBUG).
# primus_log_level: INFO
# Default true: examples/run_pretrain_cli.sh. Legacy run_pretrain.sh ignores RUN_MODE and always uses torchrun.
use_primus_cli: true
# HF model assets: pretrain_wrapper.py auto-resolves repo IDs (e.g.
# meta-llama/Llama-3.1-8B) to local snapshots when $HF_HOME is set and the
# model was previously downloaded via huggingface-cli. No hf_assets_path
# override is needed here; set HF_HOME in your environment instead.
#
# Disable Primus Turbo and all FP8 features for GPUs without native FP8 support
# (e.g. MI210/gfx90a). On MI300X+ you can remove these overrides.
modules:
  pre_trainer:
    overrides:
      model:
        converters: []
      primus_turbo:
        enable_primus_turbo: false
        enable_attention_float8: false
        use_turbo_float8_linear: false
        use_moe_fp8: false
        use_turbo_mx_linear: false
        use_turbo_async_tp: false
        use_turbo_attention: false
      training:
        mock_data: true
        local_batch_size: 4
        seq_len: 4096
      activation_checkpoint:
        mode: selective
      compile:
        enable: true


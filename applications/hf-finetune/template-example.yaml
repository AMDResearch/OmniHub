entrypoint: applications/hf-finetune/finetune.py
SFTConfig:
  output_dir: ./fine-tuned-models
  num_train_epochs: 3
  per_device_train_batch_size:
    - 1
    - 2
  fp16:
    - true
    - false
  bf16:
    - true
    - false
  gradient_checkpointing_kwargs:
    use_reentrant: true
  dataset_text_field: text
  # dont save checkpoints
  save_strategy: "no"
  ddp_find_unused_parameters: false
  fsdp:
    - ""
    - hybrid_shard
  deepspeed:
    - ""
    - train_batch_size: "auto"
      train_micro_batch_size_per_gpu: "auto"
      zero_optimization:
        stage: 2
    - train_batch_size: "auto"
      train_micro_batch_size_per_gpu: "auto"
      zero_optimization:
        stage: 3
        contiguous_gradients: true
        overlap_comm:
          - true
          - false
        reduce_bucket_size: "auto"
        stage3_prefetch_bucket_size: "auto"
        stage3_param_persistence_threshold: "auto"
        # zero3_init_flag: true # Commented out because extra inputs are not permitted in the current configuration. Re-enable if future updates allow this key.
        # low_cpu_mem_usage: false # Commented out because extra inputs are not permitted in the current configuration. Re-enable if future updates allow this key.
        stage3_gather_16bit_weights_on_model_save: "auto"
        offload_param:
          - device: "none"
          - device: "cpu"
            pin_memory:
              - true
              - false
DataTrainingArguments:
  dataset_name: mlabonne/guanaco-llama2-1k
  dataset_split_test_size: 0.1
LoRAArguments:
  lora_alpha: 15
  lora_dropout: 0.1
  r: 64
  bias: none
  task_type: CAUSAL_LM
  target_modules: all-linear
ModelArguments:
  pretrained_model_name_or_path: meta-llama/Llama-3.1-8B-Instruct
  #   args:
  #     attn_implementation: "flash_attention_2"

# Comment out for now because ROCm support for BitsAndBytes is not stable

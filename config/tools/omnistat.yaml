tools:
  - name: omnistat
    pre-execute: |
      # Configure and start Omnistat
      export OMNISTAT_CONFIG=$shared_dir/tools/omnistat/omnihub.config
      export OMNISTAT_VICTORIA_DATADIR=$results_dir/tools/omnistat/data
      omnistat_dir=$shared_dir/tools/omnistat/venv/bin/
      mkdir -p tools/omnistat
      cd tools/omnistat
      $omnistat_dir/omnistat-usermode --start --interval 1 --pushinterval 1
      cd -
    post-execute: |-
      # Stop Omnistat
      $omnistat_dir/omnistat-usermode --stopexporters
      $omnistat_dir/omnistat-query --job $SLURM_JOB_ID --interval 1 --export $results_dir/tools/omnistat > $results_dir/tools/omnistat/report.txt
      $omnistat_dir/omnistat-usermode --stopserver
  - name: omnistat-rocprofiler-pmc1
    pre-execute: |
      # Configure and start Omnistat
      export OMNISTAT_CONFIG=$shared_dir/tools/omnistat-rocprofiler/omnihub.$gpu_arch.1.config
      export OMNISTAT_VICTORIA_DATADIR=$results_dir/tools/omnistat-rocprofiler-pmc1/data
      omnistat_dir=$shared_dir/tools/omnistat-rocprofiler/venv/bin/
      mkdir -p tools/omnistat-rocprofiler-pmc1
      cd tools/omnistat-rocprofiler-pmc1
      $omnistat_dir/omnistat-usermode --start --interval 1 --pushinterval 1
      cd -
    post-execute: |-
      # Stop Omnistat
      $omnistat_dir/omnistat-usermode --stopexporters
      $omnistat_dir/omnistat-query --job $SLURM_JOB_ID --interval 1 --export $results_dir/tools/omnistat-rocprofiler-pmc1 > $results_dir/tools/omnistat-rocprofiler-pmc1/report.txt
      $omnistat_dir/omnistat-usermode --stopserver
    env:
      HSA_TOOLS_LIB: /opt/rocm/lib/librocprofiler64.so
  - name: omnistat-rocprofiler-pmc2
    pre-execute: |
      # Configure and start Omnistat
      export OMNISTAT_CONFIG=$shared_dir/tools/omnistat-rocprofiler/omnihub.$gpu_arch.2.config
      export OMNISTAT_VICTORIA_DATADIR=$results_dir/tools/omnistat-rocprofiler-pmc2/data
      omnistat_dir=$shared_dir/tools/omnistat-rocprofiler/venv/bin/
      mkdir -p tools/omnistat-rocprofiler-pmc2
      cd tools/omnistat-rocprofiler-pmc2
      $omnistat_dir/omnistat-usermode --start --interval 1 --pushinterval 1
      cd -
    post-execute: |-
      # Stop Omnistat
      $omnistat_dir/omnistat-usermode --stopexporters
      $omnistat_dir/omnistat-query --job $SLURM_JOB_ID --interval 1 --export $results_dir/tools/omnistat-rocprofiler-pmc2 > $results_dir/tools/omnistat-rocprofiler-pmc2/report.txt
      $omnistat_dir/omnistat-usermode --stopserver
    env:
      HSA_TOOLS_LIB: /opt/rocm/lib/librocprofiler64.so
